# Unified Evaluation Configuration
# Supports both traditional (Claude/LiteLLM) and realtime (OpenAI Realtime API) architectures

# Select which architecture to test: "traditional" or "realtime"
architecture: "traditional"

# Path to .env file containing API keys
env_file: "../.env"

# Vocabulary dataset (shared across all architectures and evaluation)
vocab_fp: "../traditional_speech_art/data/vocab_words4.json"
vocab_key: "list4"

# Traditional architecture configuration (Claude + LiteLLM)
traditional:
  api_key_env: "OPENAI_API_KEY"
  model: "anthropic/claude-sonnet-4-5"
  prompt_fp: "../traditional_speech_art/prompt.md"

# Realtime architecture configuration (OpenAI Realtime API)
realtime:
  api_key_env: "OPENAI_API_KEY"
  prompt_fp: "../voice2voice_web/public/prompt2.md"

# Evaluation settings (shared across both architectures)
eval_llm_model: "gemini/gemini-2.5-flash"

# Model used specifically for bot_perceived_review_accuracy LLM judge.
# Uses a separate key to avoid vendor bias (judge should be independent of the vocab bot vendor).
judge_llm_model: "anthropic/claude-sonnet-4-6"

# Simulated user bot settings (shared)
user_bot_llm: "gemini/gemini-2.5-flash"
user_bot_prompt_fp: "simulated_user_prompt.txt"
user_bot_percent_words_correct: 0.7

# Conversation settings
max_turns: 40
epochs: 4

# Production session evaluation settings
# How many recent production traces to fetch and score per eval run
production_eval_limit: 100
# How far back (in days) to look for production traces when running --production-only
# Supports floats, e.g. 0.5 = last 12 hours
production_lookback_days: 1

# Logging settings
# Optional: set log_subdir to a string (e.g. "experiment1") to organize logs into logs/<subdir>/
# Leave as null to use the default logs/ directory
log_subdir: null

